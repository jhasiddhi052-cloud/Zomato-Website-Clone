<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zomato Contact</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.container{
width:1100px;
max-width:100%;
background:#fff;
border-radius:20px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
box-shadow:0 20px 50px rgba(0,0,0,.25);
animation:show .8s ease;
}

.left{

background:#e23744;
color:white;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;

}

.left h1{

font-size:45px;
margin-bottom:20px;

}

.left p{

line-height:1.8;
margin-bottom:30px;

}

.info{

display:flex;
align-items:center;
margin:18px 0;

}

.info i{

width:50px;
height:50px;
background:white;
color:#e23744;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
margin-right:15px;
font-size:20px;

}

.social{

margin-top:30px;

}

.social a{

display:inline-flex;
width:45px;
height:45px;
background:white;
color:#e23744;
justify-content:center;
align-items:center;
border-radius:50%;
margin-right:10px;
transition:.4s;

}

.social a:hover{

background:black;
color:white;
transform:translateY(-8px);

}

.right{

padding:60px;

}

.right h2{

text-align:center;
margin-bottom:25px;
color:#e23744;
font-size:35px;

}

.inputBox{

margin-bottom:20px;

}

.inputBox input,
.inputBox textarea{

width:100%;
padding:15px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
outline:none;
transition:.4s;

}

.inputBox input:focus,
.inputBox textarea:focus{

border-color:#e23744;

}

textarea{

height:160px;
resize:none;

}

button{

width:100%;
padding:15px;
border:none;
background:#e23744;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:.4s;

}

button:hover{

background:black;
transform:translateY(-4px);

}

.map{

grid-column:1/3;

}

.map iframe{

width:100%;
height:350px;
border:none;

}

footer{

grid-column:1/3;
background:#111;
color:white;
text-align:center;
padding:20px;

}

@keyframes show{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

.left,
.right{

padding:35px;

}

.map,
footer{

grid-column:1;

}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>Contact Us</h1>

<p>
Have any questions or suggestions?
We are always happy to help you.
</p>

<div class="info">

<i class="fa-solid fa-location-dot"></i>

<span>New Delhi, India</span>

</div>

<div class="info">

<i class="fa-solid fa-phone"></i>

<span>+91 9876543210</span>

</div>

<div class="info">

<i class="fa-solid fa-envelope"></i>

<span>support@zomato.com</span>

</div>

<div class="social">

<a href="#"><i class="fab fa-facebook-f"></i></a>

<a href="#"><i class="fab fa-instagram"></i></a>

<a href="#"><i class="fab fa-twitter"></i></a>

<a href="#"><i class="fab fa-linkedin-in"></i></a>

</div>

</div>

<div class="right">

<h2>Send Message</h2>

<div class="inputBox">

<input type="text" id="name" placeholder="Your Name">

</div>

<div class="inputBox">

<input type="email" id="email" placeholder="Your Email">

</div>

<div class="inputBox">

<textarea id="message" placeholder="Type your message..."></textarea>

</div>

<button onclick="sendMessage()" id="btn">

Send Message

</button>

</div>

<div class="map">

<iframe
src="https://www.google.com/maps?q=New+Delhi&output=embed">
</iframe>

</div>

<footer>

<h3>Zomato Clone</h3>

<p>© 2026 All Rights Reserved</p>

</footer>

</div>

<script>

function sendMessage(){

let name=document.getElementById("name").value.trim();

let email=document.getElementById("email").value.trim();

let message=document.getElementById("message").value.trim();

if(name==""||email==""||message==""){

alert("Please fill all fields.");

return;

}

let btn=document.getElementById("btn");

btn.innerHTML="Sending...";

btn.disabled=true;

setTimeout(function(){

alert("Thank You "+name+"! Your message has been sent.");

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("message").value="";

btn.innerHTML="Send Message";
btn.disabled=false;

},1500);

}

</script>

</body>
</html>
